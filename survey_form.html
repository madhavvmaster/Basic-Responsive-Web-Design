<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">Survey Form</h1>
    <p id="description">This will help us to improve!</p>
    <form id="survey-form">
      <label for="name" id="name-label">Full Name:</label>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="e.g., John Doe"
        required
      /><br />
      <label for="email" id="email-label">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="fake@example.com"
        required
      /><br />
      <label for="number-label" id="number-label">Age:</label>
      <input
        type="number"
        id="number"
        name="age"
        min="3"
        max="100"
        placeholder="between 3 to 100"
      /><br />
      <label for="dropdown-label">Select Profession: </label>
      <select id="dropdown">
        <option id="service">Service</option>
        <option id="business">Business</option></select
      ><br />
      <label for="gender-label">Select Gender: </label>
      <input type="radio" id="male" name="gender" value="male" />
      <label for="male">Male</label>
      <input type="radio" id="female" name="gender" value="female" />
      <label for="female">Female</label><br />
      <label for="checkbox-label">Select hobbies:</label>
      <input type="checkbox" id="dancing" name="dancing" value="dancing" />
      <label for="dancing">Dancing</label>
      <input type="checkbox" id="singing" name="singing" value="singing" />
      <label for="dancing">Singing</label>
      <input type="checkbox" id="coding" name="coding" value="coding" />
      <label for="dancing">Coding</label>
      <input type="checkbox" id="writing" name="writing" value="writing" />
      <label for="dancing">writing</label><br />
      <label for="reviews">Review:</label>
      <textarea id="reviews" cols="30" rows="10"> </textarea><br />
      <button type="submit" id="submit">Submit</button>
    </form>
  </body>
</html>
